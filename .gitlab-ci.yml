image: python:3.12

stages:
  - check
  - deploy

verificar_codigo:
  stage: check
  script:
    - pip install --upgrade pip
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - python -m compileall .

sync_to_github:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - git config --global user.email "gitlab-ci@example.com"
    - git config --global user.name "GitLab CI"
  script:
    - |
      curl -H "Authorization: token $GH_TOKEN" \
           -d "{\"name\": \"$CI_PROJECT_NAME\", \"private\": false}" \
           https://api.github.com/user/repos || true
    - git remote remove github || true
    - git remote add github https://$GH_USER:$GH_TOKEN@github.com/$GH_USER/$CI_PROJECT_NAME.git
    - git push github HEAD:refs/heads/$CI_COMMIT_REF_NAME --force --tags
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
